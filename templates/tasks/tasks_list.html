<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Task Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f7ff;
      --card:#ffffff;
      --muted:#6b7280;
      --line:#e9edf5;
      --shadow:0 10px 30px rgba(10,22,70,.08);
    }
    body { background: linear-gradient(130deg,#f8faff,#eef3ff); min-height:100vh; }
    .topbar {
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(6px);
      border:1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius:16px;
    }
    .app-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      background: var(--card);
    }
    .stats-card{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:14px;
      height:100%;
    }
    .stats-title{ color:var(--muted); font-size:.85rem; margin-bottom:4px; }
    .stats-value{ font-size:1.4rem; font-weight:700; }
    .task-item{
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      background:#fff;
      transition:.2s ease;
      height:100%;
    }
    .task-item:hover{ transform: translateY(-2px); box-shadow:0 8px 20px rgba(10,22,70,.08); }
    .priority-todo { background:#e7f1ff; color:#0d6efd; }
    .priority-doing { background:#fff3cd; color:#9a6700; }
    .priority-done { background:#d1e7dd; color:#146c43; }
    .muted { color: var(--muted); }
    .avatar {
      width:38px;height:38px;border-radius:50%;
      display:grid;place-items:center;
      background:#1f6feb;color:#fff;font-weight:700;
    }
  </style>
</head>
<body>
  <div class="container py-4 py-md-5">

    <!-- Topbar -->
    <div class="topbar p-3 p-md-4 mb-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div class="d-flex align-items-center gap-3">
          <div class="avatar" id="avatarText">U</div>
          <div>
            <h5 class="mb-0 fw-bold">Task Dashboard</h5>
            <div class="muted small">Welcome back, <span id="userName">User</span></div>
            <div class="muted small" id="userEmail"></div>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-secondary btn-sm" onclick="loadTasks()">Refresh</button>
          <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3"><div class="stats-card"><div class="stats-title">Total</div><div class="stats-value" id="statTotal">0</div></div></div>
      <div class="col-6 col-md-3"><div class="stats-card"><div class="stats-title">Todo</div><div class="stats-value text-primary" id="statTodo">0</div></div></div>
      <div class="col-6 col-md-3"><div class="stats-card"><div class="stats-title">Doing</div><div class="stats-value text-warning" id="statDoing">0</div></div></div>
      <div class="col-6 col-md-3"><div class="stats-card"><div class="stats-title">Done</div><div class="stats-value text-success" id="statDone">0</div></div></div>
    </div>

    <div class="card app-card">
      <div class="card-body p-4">
        <!-- Add Task -->
        <form id="taskForm" class="row g-2 mb-3">
          <div class="col-12 col-md-4">
            <input type="text" name="title" class="form-control" placeholder="Task title" required />
          </div>
          <div class="col-12 col-md-4">
            <input type="text" name="description" class="form-control" placeholder="Description" />
          </div>
          <div class="col-12 col-md-2">
            <select name="status" class="form-select">
              <option value="todo">Todo</option>
              <option value="doing">Doing</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="col-12 col-md-2 d-grid">
            <button type="submit" class="btn btn-primary">+ Add Task</button>
          </div>
        </form>

        <!-- Search + Filter -->
        <div class="row g-2 mb-4">
          <div class="col-12 col-md-8">
            <input id="searchInput" type="text" class="form-control" placeholder="Search by title or description..." />
          </div>
          <div class="col-12 col-md-4">
            <select id="statusFilter" class="form-select">
              <option value="all">All status</option>
              <option value="todo">Todo</option>
              <option value="doing">Doing</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>

        <div id="taskList" class="row g-3"></div>
      </div>
    </div>
  </div>

  <script>
    const access = localStorage.getItem("access");
    if (!access) window.location.href = "/";

    const taskList = document.getElementById("taskList");
    const taskForm = document.getElementById("taskForm");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");

    let allTasks = [];

    function badge(status) {
      if (status === "todo") return `<span class="badge priority-todo">Todo</span>`;
      if (status === "doing") return `<span class="badge priority-doing">Doing</span>`;
      return `<span class="badge priority-done">Done</span>`;
    }

    function setStats(tasks) {
      const total = tasks.length;
      const todo = tasks.filter(t => t.status === "todo").length;
      const doing = tasks.filter(t => t.status === "doing").length;
      const done = tasks.filter(t => t.status === "done").length;

      document.getElementById("statTotal").textContent = total;
      document.getElementById("statTodo").textContent = todo;
      document.getElementById("statDoing").textContent = doing;
      document.getElementById("statDone").textContent = done;
    }

    function renderTasks(tasks) {
      if (!Array.isArray(tasks) || tasks.length === 0) {
        taskList.innerHTML = `
          <div class="col-12">
            <div class="alert alert-light border text-center mb-0">
              No matching tasks found.
            </div>
          </div>`;
        return;
      }

      taskList.innerHTML = tasks.map(task => `
        <div class="col-12 col-md-6 col-xl-4">
          <div class="task-item">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h6 class="mb-1 fw-semibold">${task.title ?? ""}</h6>
              ${badge(task.status)}
            </div>

            <p class="text-muted small mb-3">${task.description ?? "No description"}</p>

            <div class="d-flex justify-content-between align-items-center">
              <small class="muted">#${task.id}</small>
              <button class="btn btn-sm btn-outline-danger" onclick="deleteTask(${task.id})">Delete</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    function applyFilters() {
      const q = (searchInput.value || "").toLowerCase().trim();
      const s = statusFilter.value;

      const filtered = allTasks.filter(t => {
        const text = `${t.title || ""} ${t.description || ""}`.toLowerCase();
        const matchesText = !q || text.includes(q);
        const matchesStatus = s === "all" || t.status === s;
        return matchesText && matchesStatus;
      });

      renderTasks(filtered);
    }

   async function loadProfile() {
    const res = await fetch("/api/auth/me/", {
      headers: { Authorization: `Bearer ${access}` }
    });

    if (!res.ok) return;
    const user = await res.json();

    // Try best possible display name from backend response
    const fullName =
      user.full_name ||
      [user.first_name, user.last_name].filter(Boolean).join(" ").trim() ||
      user.name ||
      user.username ||
      (user.email ? user.email.split("@")[0] : "") ||
      "User";

    const email = user.email || "";

    document.getElementById("userName").textContent = fullName;
    document.getElementById("userEmail").textContent = email;
    document.getElementById("avatarText").textContent = (fullName[0] || "U").toUpperCase();
  }

    async function loadTasks() {
      const res = await fetch("/api/tasks/", {
        headers: { Authorization: `Bearer ${access}` }
      });

      if (res.status === 401) {
        localStorage.removeItem("access");
        window.location.href = "/";
        return;
      }

      const tasks = await res.json();
      allTasks = Array.isArray(tasks) ? tasks : [];
      setStats(allTasks);
      applyFilters();
    }

    async function addTask(e) {
      e.preventDefault();
      const formData = new FormData(taskForm);
      const payload = {
        title: (formData.get("title") || "").trim(),
        description: (formData.get("description") || "").trim(),
        status: formData.get("status") || "todo"
      };

      const res = await fetch("/api/tasks/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${access}`
        },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        taskForm.reset();
        await loadTasks();
      } else {
        alert("Failed to add task");
      }
    }

    async function deleteTask(id) {
      if (!confirm("Delete this task?")) return;

      const res = await fetch(`/api/tasks/${id}/`, {
        method: "DELETE",
        headers: { Authorization: `Bearer ${access}` }
      });

      if (res.status === 204 || res.ok) {
        await loadTasks();
      } else {
        alert("Failed to delete task");
      }
    }

    taskForm.addEventListener("submit", addTask);
    searchInput.addEventListener("input", applyFilters);
    statusFilter.addEventListener("change", applyFilters);

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("access");
      window.location.href = "/";
    });

    loadProfile(); // if /api/auth/me/ doesn't exist, it silently skips
    loadTasks();
  </script>
</body>
</html>
