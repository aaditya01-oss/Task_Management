<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Task Manager{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f6f8fb; }
    .navbar-brand { font-weight: 700; }
    .card { border: 0; border-radius: 14px; box-shadow: 0 6px 18px rgba(0,0,0,.06); }
    .badge-soft { font-weight: 500; padding: .45em .65em; border-radius: 999px; }
    .priority-high { background: #ffe3e3; color: #c92a2a; }
    .priority-medium { background: #fff3bf; color: #e67700; }
    .priority-low { background: #d3f9d8; color: #2b8a3e; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Task Manager</a>
      <div class="ms-auto d-flex gap-2">
        <a href="/tasks/create/" class="btn btn-sm btn-success">+ New Task</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
